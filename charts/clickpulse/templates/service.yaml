apiVersion: v1
kind: Service
metadata:
  name: {{ include "clickpulse.fullname" . }}
  labels:
    {{- include "clickpulse.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "clickpulse.selectorLabels" . | nindent 4 }}
