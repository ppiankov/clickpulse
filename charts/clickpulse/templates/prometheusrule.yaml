{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "clickpulse.fullname" . }}
  labels:
    {{- include "clickpulse.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: clickpulse.rules
      rules:
        - alert: ClickHouseDown
          expr: clickhouse_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "ClickHouse is unreachable"
        - alert: ClickHouseScrapeErrors
          expr: sum by (node) (increase(clickhouse_scrape_errors_total[10m])) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "clickpulse scrape errors on {{ "{{ $labels.node }}" }}"
        - alert: ClickHouseReplicaLag
          expr: clickhouse_replica_table_lag_seconds > 30
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ClickHouse replica {{ "{{ $labels.database }}" }}.{{ "{{ $labels.table }}" }} lag > 30s"
        - alert: ClickHouseReplicaSyncErrors
          expr: |
            sum by (node) (increase(clickhouse_replicated_part_failed_fetches_total[10m])) > 0
            or
            sum by (node) (increase(clickhouse_replicated_part_checks_failed_total[10m])) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "ClickHouse replica sync errors on {{ "{{ $labels.node }}" }}"
        - alert: ClickHouseReplicationDataLoss
          expr: sum by (node) (increase(clickhouse_replicated_data_loss_total[10m])) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "ClickHouse replicated data loss on {{ "{{ $labels.node }}" }}"
        - alert: ClickHouseKafkaFailures
          expr: sum by (node, type) (increase(clickhouse_kafka_failures_total[10m])) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "ClickHouse Kafka {{ "{{ $labels.type }}" }} failures on {{ "{{ $labels.node }}" }}"
        - alert: ClickHouseObjectStorageRequestFailures
          expr: sum by (node, storage, operation, type) (increase(clickhouse_object_storage_request_failures_total[10m])) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ClickHouse {{ "{{ $labels.storage }}" }} {{ "{{ $labels.operation }}" }} {{ "{{ $labels.type }}" }} failures on {{ "{{ $labels.node }}" }}"
        - alert: ClickHouseObjectStorageQueueFailures
          expr: sum by (node, type) (increase(clickhouse_object_storage_queue_failures_total[10m])) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "ClickHouse object storage queue {{ "{{ $labels.type }}" }} failures on {{ "{{ $labels.node }}" }}"
        - alert: ClickHouseQueryMemoryLimitExceeded
          expr: sum by (node) (increase(clickhouse_query_memory_limit_exceeded_total[10m])) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "ClickHouse query memory limit exceeded on {{ "{{ $labels.node }}" }}"
        - alert: ClickHouseGuardrailRejections
          expr: sum by (node, type) (increase(clickhouse_guardrail_rejections_total[10m])) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "ClickHouse {{ "{{ $labels.type }}" }} guardrail rejections on {{ "{{ $labels.node }}" }}"
        - alert: ClickHouseKeeperSoftMemoryLimitRejections
          expr: sum by (node) (increase(clickhouse_keeper_soft_memory_limit_rejections_total[10m])) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "ClickHouse Keeper soft memory limit rejections on {{ "{{ $labels.node }}" }}"
        - alert: ClickHouseMergeBacklog
          expr: clickhouse_merges_active > 50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ClickHouse merge backlog high"
        - alert: ClickHouseStuckMutations
          expr: clickhouse_mutations_stuck > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "ClickHouse has stuck mutations"
        - alert: ClickHousePartExplosion
          expr: max(clickhouse_parts_per_partition) > 300
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ClickHouse partition has > 300 parts"
        - alert: ClickHouseDiskFull
          expr: clickhouse_disk_used_ratio > 0.95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ClickHouse disk > 95% full"
        - alert: ClickHouseReplicaReadonly
          expr: sum(clickhouse_replica_readonly) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ClickHouse has read-only replicas"
        - alert: ClickHouseKeeperDown
          expr: clickhouse_keeper_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Keeper node {{ "{{ $labels.keeper }}" }} is unreachable"
        - alert: ClickHouseKeeperNoLeader
          expr: sum(clickhouse_keeper_is_leader) == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "No Keeper leader elected across the cluster"
        - alert: ClickHouseKeeperHighLatency
          expr: clickhouse_keeper_latency_seconds > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Keeper {{ "{{ $labels.keeper }}" }} latency > 500ms"
        - alert: ClickHouseKeeperOutstandingRequests
          expr: clickhouse_keeper_outstanding_requests > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Keeper {{ "{{ $labels.keeper }}" }} has > 100 outstanding requests"
{{- end }}
